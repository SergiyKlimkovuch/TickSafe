<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TickSafe — Onboarding</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100vh;background:#B8B2A8;font-family:'Nunito',sans-serif;
    display:flex;align-items:center;justify-content:center}
  #root{display:flex;align-items:center;justify-content:center;min-height:100vh;
    width:100%;padding:24px 16px}
  @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
  @keyframes ping{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.2);opacity:0}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes scanBar{0%{top:12%}50%{top:80%}100%{top:12%}}
  @keyframes ripple{0%{transform:scale(.6);opacity:.9}100%{transform:scale(2.4);opacity:0}}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(134,186,108,.6)}
    50%{box-shadow:0 0 0 10px rgba(134,186,108,0)}}
  button{cursor:pointer;font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent}
  input{font-family:'Nunito',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ── TOKENS ─────────────────────────────────────────────── */
const C={
  bg:'#ECEAE2', bgDark:'#091408',
  dark:'#112814', green:'#86BA6C', greenMid:'#5E8F49',
  greenLight:'#E6F5DE', greenFaint:'#F0F9EB',
  amber:'#F5C124', red:'#E84040',
  white:'#FFFFFF', text:'#112814',
  sub:'#7A8C7C', muted:'#B0BFB2',
  border:'rgba(17,40,20,.09)', card:'rgba(17,40,20,.06)',
};

/* ── HOOKS ──────────────────────────────────────────────── */
function useIn(on,ms=0){
  const[v,sv]=useState(false);
  useEffect(()=>{if(!on){sv(false);return}const t=setTimeout(()=>sv(true),ms);return()=>clearTimeout(t)},[on,ms]);
  return v;
}
function useCnt(target,run,dur=2000){
  const[v,sv]=useState(0);
  useEffect(()=>{
    if(!run){sv(0);return}
    let s=null;
    const f=ts=>{if(!s)s=ts;const p=Math.min((ts-s)/dur,1);const e=1-Math.pow(1-p,4);
      sv(Math.round(e*target));if(p<1)requestAnimationFrame(f)};
    requestAnimationFrame(f);
  },[run,target,dur]);
  return v;
}

/* ── ATOMS ──────────────────────────────────────────────── */
const FU=({show,d=0,ms=480,sx,ch})=>(
  <div style={{opacity:show?1:0,transform:show?'translateY(0)':'translateY(16px)',
    transition:`opacity ${ms}ms ease ${d}ms,transform ${ms}ms ease ${d}ms`,...sx}}>{ch}</div>
);

function Btn({label,onClick,bg=C.dark,col=C.white,sx}){
  const[p,sp]=useState(false);
  return(
    <button onClick={onClick} onMouseDown={()=>sp(true)} onMouseUp={()=>sp(false)} onMouseLeave={()=>sp(false)}
      style={{width:'100%',padding:'17px 24px',borderRadius:28,background:bg,color:col,border:'none',
        fontSize:17,fontWeight:800,letterSpacing:'.01em',
        transform:p?'scale(.97)':'scale(1)',
        boxShadow:p?'none':`0 6px 20px ${bg}55`,
        transition:'transform .12s,box-shadow .18s',...sx}}>{label}</button>
  );
}
const Ghost=({label,onClick,sx})=>(
  <button onClick={onClick} style={{background:'none',border:'none',color:C.sub,
    fontSize:15,fontWeight:600,padding:'12px 0',width:'100%',textAlign:'center',...sx}}>{label}</button>
);
const Skip=({onClick})=>(
  <button onClick={onClick} style={{background:'none',border:'none',color:C.sub,
    fontSize:15,fontWeight:600,padding:'4px 0',position:'absolute',top:16,right:20,zIndex:5}}
  >Skip</button>
);

function SBar({light}){
  const c=light?'rgba(255,255,255,.8)':C.dark;
  return(
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
      padding:'14px 22px 0',fontSize:13,fontWeight:700,color:c,flexShrink:0,userSelect:'none'}}>
      <span>9:41</span>
      <div style={{width:114,height:30,background:light?'rgba(0,0,0,.75)':'#0d0d0d',borderRadius:20}}/>
      <span style={{fontSize:11,letterSpacing:'2px'}}>▲▲▲ ◈ ▮</span>
    </div>
  );
}
function Nav({step,total,onBack,light}){
  const c=light?C.white:C.dark;
  const pct=(step/(total-1))*100;
  return(
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 22px 6px',flexShrink:0}}>
      <button onClick={onBack} style={{background:'none',border:'none',color:c,
        fontSize:18,padding:'4px 8px',marginLeft:-8,
        opacity:step===0?.001:1,pointerEvents:step===0?'none':'auto',flexShrink:0}}>←</button>
      <div style={{flex:1,height:4,background:light?'rgba(255,255,255,.2)':'rgba(17,40,20,.1)',
        borderRadius:3,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${pct}%`,background:light?C.green:C.dark,
          borderRadius:3,transition:'width .55s ease'}}/>
      </div>
      <div style={{width:8,height:8,borderRadius:'50%',background:light?C.green:C.dark,
        flexShrink:0,boxShadow:`0 0 6px ${light?C.green:C.dark}88`}}/>
    </div>
  );
}

/* Cloud layer — matches Figma illustrated clouds */
const Cloud=({w,x,y,op,flip})=>(
  <div style={{position:'absolute',left:x,top:y,width:w,pointerEvents:'none',
    transform:flip?'scaleX(-1)':'none',opacity:op}}>
    <svg viewBox="0 0 120 60" style={{width:'100%',display:'block'}}>
      <ellipse cx="60" cy="46" rx="55" ry="18" fill="white"/>
      <ellipse cx="38" cy="36" rx="26" ry="22" fill="white"/>
      <ellipse cx="68" cy="30" rx="28" ry="24" fill="white"/>
      <ellipse cx="94" cy="40" rx="22" ry="18" fill="white"/>
    </svg>
  </div>
);
const Clouds=()=>(
  <div style={{position:'absolute',inset:0,zIndex:0,overflow:'hidden',pointerEvents:'none'}}>
    <Cloud w={130} x="0%" y="8%" op={.55}/>
    <Cloud w={90}  x="55%" y="5%" op={.45}/>
    <Cloud w={110} x="58%" y="18%" op={.38} flip/>
    <Cloud w={80}  x="-2%" y="24%" op={.3}/>
    <Cloud w={70}  x="42%" y="30%" op={.25}/>
  </div>
);

/* ══════════════════════════════════════════════════════════
   S1 — WELCOME
══════════════════════════════════════════════════════════ */
function S1({active,onNext}){
  const a=useIn(active,80),b=useIn(active,230),c=useIn(active,390),
        d=useIn(active,560),e=useIn(active,720);
  return(
    <div style={{display:'flex',flexDirection:'column',flex:1,
      padding:'10px 22px 28px',position:'relative',zIndex:1}}>
      <FU show={a} sx={{textAlign:'center',paddingTop:6}} ch={
        <div style={{width:72,height:72,borderRadius:20,background:C.dark,
          display:'inline-flex',alignItems:'center',justifyContent:'center',
          fontSize:34,boxShadow:'0 8px 24px rgba(17,40,20,.3)'}}>🎯</div>
      }/>
      <FU show={b} d={0} sx={{marginTop:18,textAlign:'center'}} ch={
        <h1 style={{fontSize:34,fontWeight:900,color:C.dark,lineHeight:1.08,letterSpacing:'-.02em'}}>
          Peace of mind,<br/>after every walk
        </h1>
      }/>
      <FU show={c} sx={{marginTop:10,textAlign:'center'}} ch={
        <p style={{color:C.sub,fontSize:16,lineHeight:1.55}}>
          Quick daily AI-powered scanning<br/>keeps your pets safe from hidden ticks
        </p>
      }/>
      <FU show={d} sx={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}} ch={
        <div style={{fontSize:118,lineHeight:1,
          animation:d?'floatY 3s ease-in-out infinite':'none',
          filter:'drop-shadow(0 12px 18px rgba(0,0,0,.14))'}}>🐕</div>
      }/>
      <FU show={e} ch={<Btn label="Get started" onClick={onNext}/>}/>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   S2 — SOCIAL PROOF
══════════════════════════════════════════════════════════ */
function S2({active,onNext}){
  const cnt=useCnt(1284391,active,2100);
  const a=useIn(active,120),b=useIn(active,380),c=useIn(active,700),
        d=useIn(active,1000),e=useIn(active,1200);
  const fmt=n=>n.toLocaleString('en-US');
  return(
    <div style={{display:'flex',flexDirection:'column',flex:1,
      padding:'16px 22px 28px',color:C.white}}>
      <FU show={a} sx={{textAlign:'center',marginTop:10}} ch={
        <div style={{display:'inline-flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:32}}>🏆</span>
          <div>
            <div style={{fontSize:28,fontWeight:900,letterSpacing:'-.02em',lineHeight:1}}>Top 1</div>
            <div style={{fontSize:13,fontWeight:700,color:C.green,marginTop:2}}>for finding ticks</div>
          </div>
          <span style={{fontSize:32}}>🏆</span>
        </div>
      }/>
      <div style={{flex:1,display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',gap:8}}>
        <FU show={b} sx={{textAlign:'center'}} ch={
          <>
            <div style={{fontSize:54,fontWeight:900,color:C.green,lineHeight:1,
              letterSpacing:'-.02em',fontVariantNumeric:'tabular-nums',
              textShadow:'0 0 48px rgba(134,186,108,.35)'}}>{fmt(cnt)}</div>
            <div style={{fontSize:24,fontWeight:800,marginTop:6,letterSpacing:'-.01em'}}>
              ticks found</div>
          </>
        }/>
        <FU show={c} sx={{textAlign:'center',marginTop:12}} ch={
          <p style={{color:'rgba(255,255,255,.5)',fontSize:16,lineHeight:1.55}}>
            By pet owners using<br/>this app since 2026
          </p>
        }/>
        <FU show={d} sx={{marginTop:14}} ch={
          <div style={{display:'inline-flex',alignItems:'center',gap:8,
            border:'1.5px solid rgba(134,186,108,.3)',borderRadius:24,
            padding:'10px 20px',fontSize:14,fontWeight:700,color:C.green}}>
            🌐 Across 40+ countries
          </div>
        }/>
      </div>
      <FU show={e} ch={<Btn label="Continue" onClick={onNext} bg={C.green}/>}/>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   S3 — STAKES
══════════════════════════════════════════════════════════ */
function S3({active,onNext}){
  const a=useIn(active,100),b=useIn(active,380),c=useIn(active,720),
        d=useIn(active,1060),e=useIn(active,1260);
  const Stat=({show,val,col,lbl})=>(
    <FU show={show} sx={{textAlign:'center',padding:'2px 0'}} ch={
      <>
        <div style={{fontSize:46,fontWeight:900,color:col,lineHeight:1,
          letterSpacing:'-.02em'}}>{val}</div>
        <div style={{fontSize:13,color:C.sub,marginTop:5,lineHeight:1.45}}>{lbl}</div>
      </>
    }/>
  );
  return(
    <div style={{display:'flex',flexDirection:'column',flex:1,
      padding:'10px 22px 28px',position:'relative',zIndex:1}}>
      <FU show={a} sx={{marginTop:6}} ch={
        <h1 style={{fontSize:27,fontWeight:900,color:C.dark,lineHeight:1.12,
          letterSpacing:'-.02em'}}>
          What happens without<br/>early tick detection?
        </h1>
      }/>
      <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',gap:18}}>
        <Stat show={b} val="7 days" col={C.greenMid} lbl="How long a tick can feed undetected in fur"/>
        <div style={{height:1,background:C.border}}/>
        <Stat show={c} val="15 minutes" col={C.greenMid} lbl="How quickly Powassan virus can be transmitted"/>
        <div style={{height:1,background:C.border}}/>
        <Stat show={d} val="$4,200" col={C.red} lbl="Average vet cost for treated Lyme disease in dogs"/>
      </div>
      <FU show={e} ch={<Btn label="Continue" onClick={onNext}/>}/>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   S4 — PET TYPE
══════════════════════════════════════════════════════════ */
const PETS=[{e:'🐕',l:'Dog'},{e:'🐈',l:'Cat'},{e:'🐇',l:'Rabbit'},{e:'🐾',l:'Other'}];
function S4({active,onNext}){
  const[sel,ss]=useState(0);
  const a=useIn(active,100);
  const p0=useIn(active,270),p1=useIn(active,360),p2=useIn(active,450),p3=useIn(active,540);
  const pp=[p0,p1,p2,p3]; const e=useIn(active,720);
  return(
    <div style={{display:'flex',flexDirection:'column',flex:1,
      padding:'10px 22px 28px',position:'relative',zIndex:1}}>
      <FU show={a} sx={{marginTop:6}} ch={
        <h1 style={{fontSize:27,fontWeight:900,color:C.dark,lineHeight:1.12,letterSpacing:'-.02em'}}>
          What kind of pet<br/>do you have?
        </h1>
      }/>
      <div style={{flex:1,display:'flex',alignItems:'center'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,width:'100%'}}>
          {PETS.map((p,i)=>{
            const s=sel===i;
            return(
              <FU key={p.l} show={pp[i]} sx={{height:138}} ch={
                <div onClick={()=>ss(i)} style={{height:'100%',borderRadius:20,cursor:'pointer',
                  display:'flex',flexDirection:'column',alignItems:'center',
                  justifyContent:'center',gap:10,
                  background:s?C.greenLight:C.white,
                  border:`2px solid ${s?C.green:C.border}`,
                  transform:s?'scale(1.03)':'scale(1)',
                  boxShadow:s?`0 6px 20px rgba(134,186,108,.22)`:'0 2px 10px rgba(17,40,20,.07)',
                  transition:'all .2s ease'}}>
                  <div style={{width:52,height:52,borderRadius:14,
                    background:s?'rgba(134,186,108,.18)':C.greenLight,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:25}}>{p.e}</div>
                  <span style={{fontWeight:800,fontSize:14,color:C.dark}}>{p.l}</span>
                </div>
              }/>
            );
          })}
        </div>
      </div>
      <FU show={e} ch={<Btn label="Continue" onClick={onNext}/>}/>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   S5 — PET NAME
══════════════════════════════════════════════════════════ */
function S5({active,onNext}){
  const[name,sn]=useState('');
  const a=useIn(active,100),b=useIn(active,310),c=useIn(active,500);
  const iRef=useRef();
  useEffect(()=>{if(b&&iRef.current)setTimeout(()=>iRef.current.focus(),80)},[b]);
  return(
    <div style={{display:'flex',flexDirection:'column',flex:1,
      padding:'10px 22px 28px',position:'relative',zIndex:1}}>
      <FU show={a} sx={{marginTop:6}} ch={
        <h1 style={{fontSize:27,fontWeight:900,color:C.dark,lineHeight:1.12,letterSpacing:'-.02em'}}>
          What's your<br/>pet's name?
        </h1>
      }/>
      <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',gap:20}}>
        <FU show={b} ch={
          <input ref={iRef} value={name} onChange={e=>sn(e.target.value)}
            placeholder="E.g. Max"
            style={{width:'100%',border:'none',outline:'none',background:'transparent',
              borderBottom:`3px solid ${name?C.green:C.muted}`,
              fontSize:30,fontWeight:900,color:C.dark,padding:'8px 0',
              caretColor:C.green,letterSpacing:'-.01em',transition:'border-color .3s'}}/>
        }/>
        {name&&(
          <div style={{textAlign:'center',animation:'fadeUp .4s ease'}}>
            <div style={{fontSize:80,animation:'floatY 2.5s ease-in-out infinite',
              filter:'drop-shadow(0 8px 16px rgba(0,0,0,.1))'}}>🐕</div>
            <p style={{color:C.sub,fontSize:16,marginTop:10}}>
              Hi, <strong style={{color:C.dark,fontWeight:900}}>{name}</strong>! 👋
            </p>
          </div>
        )}
      </div>
      <FU show={c} ch={
        <Btn label="Continue" onClick={onNext}
          sx={{opacity:name?1:.4,transition:'opacity .3s'}}/>
      }/>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   S6 — FREQUENCY
══════════════════════════════════════════════════════════ */
const FREQ=[
  {e:'🎯',l:'After every walk'},
  {e:'📅',l:'A few times a week'},
  {e:'⏰',l:'Occasionally'},
  {e:'😔',l:'Rarely or never'},
];
function S6({active,onNext}){
  const[sel,ss]=useState(0);
  const a=useIn(active,100);
  const r0=useIn(active,260),r1=useIn(active,355),r2=useIn(active,450),r3=useIn(active,545);
  const rr=[r0,r1,r2,r3]; const e=useIn(active,730);
  return(
    <div style={{display:'flex',flexDirection:'column',flex:1,
      padding:'10px 22px 28px',position:'relative',zIndex:1}}>
      <FU show={a} sx={{marginTop:6}} ch={
        <h1 style={{fontSize:26,fontWeight:900,color:C.dark,lineHeight:1.12,letterSpacing:'-.02em'}}>
          How often do you<br/>check for ticks?
        </h1>
      }/>
      <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',gap:10}}>
        {FREQ.map((f,i)=>{
          const s=sel===i;
          return(
            <FU key={f.l} show={rr[i]} ch={
              <div onClick={()=>ss(i)} style={{
                display:'flex',alignItems:'center',gap:14,
                padding:'14px 16px',borderRadius:18,cursor:'pointer',
                background:s?C.greenLight:C.white,
                border:`2px solid ${s?C.green:C.border}`,
                boxShadow:s?'0 4px 16px rgba(134,186,108,.18)':'0 1px 8px rgba(17,40,20,.06)',
                transform:s?'translateX(4px)':'translateX(0)',
                transition:'all .2s ease'}}>
                <div style={{width:42,height:42,borderRadius:12,background:C.greenLight,
                  display:'flex',alignItems:'center',justifyContent:'center',fontSize:19,flexShrink:0}}>
                  {f.e}</div>
                <span style={{fontWeight:700,fontSize:15,color:C.dark,flex:1}}>{f.l}</span>
                {s&&<div style={{width:22,height:22,borderRadius:'50%',background:C.green,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:12,color:C.white,fontWeight:900,flexShrink:0}}>✓</div>}
              </div>
            }/>
          );
        })}
      </div>
      <FU show={e} ch={<Btn label="Continue" onClick={onNext}/>}/>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   S7 — ALERT (Good habit card)
══════════════════════════════════════════════════════════ */
function S7({active,onNext}){
  const a=useIn(active,100),b=useIn(active,380),c=useIn(active,560);
  return(
    <div style={{display:'flex',flexDirection:'column',flex:1,
      padding:'10px 22px 28px',position:'relative',zIndex:1}}>
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <FU show={b} sx={{width:'100%'}} ch={
          <div style={{background:C.white,borderRadius:24,padding:'32px 24px 28px',
            boxShadow:'0 8px 32px rgba(17,40,20,.10)',
            display:'flex',flexDirection:'column',alignItems:'center',
            textAlign:'center',gap:16}}>
            <div style={{width:64,height:64,borderRadius:18,background:C.greenLight,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:30}}>
              📅
            </div>
            <h2 style={{fontSize:24,fontWeight:900,color:C.dark,
              letterSpacing:'-.02em',lineHeight:1.1}}>Good habit</h2>
            <p style={{fontSize:15,color:C.sub,lineHeight:1.6,maxWidth:280}}>
              Most owners still miss the hard-to-reach spots — we'll show you exactly where to look.
            </p>
          </div>
        }/>
      </div>
      <FU show={c} ch={<Btn label="Continue" onClick={onNext}/>}/>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   S8 — TICKS HIDE
══════════════════════════════════════════════════════════ */
const SPOTS=[
  {n:1,lbl:'Behind ears',x:'46%',y:'16%'},
  {n:2,lbl:'Neck',x:'48%',y:'28%'},
  {n:3,lbl:'Groin',x:'42%',y:'55%'},
  {n:4,lbl:'Armpits',x:'24%',y:'44%'},
  {n:5,lbl:'Between toes',x:'30%',y:'78%'},
  {n:6,lbl:'Base of tail',x:'74%',y:'50%'},
];
function S8({active,onNext}){
  const[tip,st]=useState(null);
  const a=useIn(active,80),b=useIn(active,350),c=useIn(active,700);
  return(
    <div style={{display:'flex',flexDirection:'column',flex:1,
      padding:'10px 22px 28px',position:'relative',zIndex:1}}>
      <FU show={a} sx={{marginTop:6}} ch={
        <>
          <h1 style={{fontSize:26,fontWeight:900,color:C.dark,lineHeight:1.12,
            letterSpacing:'-.02em'}}>
            Ticks go straight for<br/>the hiding spots
          </h1>
          <p style={{color:C.sub,fontSize:14,marginTop:8}}>
            These are the zones most owners miss
          </p>
        </>
      }/>
      {/* Dog map */}
      <FU show={b} sx={{flex:1,position:'relative',minHeight:260}} ch={
        <>
          {/* Dog silhouette placeholder */}
          <div style={{position:'absolute',inset:0,display:'flex',
            alignItems:'center',justifyContent:'center'}}>
            <div style={{fontSize:180,opacity:.13,filter:'grayscale(1)',

/* ══════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════ */
const SCREENS=[
  {C:S1,  bg:C.bg,     light:false, clouds:true,  nav:false, name:'Welcome'},
  {C:S2,  bg:C.bgDark, light:true,  clouds:false, nav:true,  name:'Social Proof'},
  {C:S3,  bg:C.bg,     light:false, clouds:true,  nav:true,  name:'Stakes'},
  {C:S4,  bg:C.bg,     light:false, clouds:true,  nav:true,  name:'Pet Type'},
  {C:S5,  bg:C.bg,     light:false, clouds:true,  nav:true,  name:'Pet Name'},
  {C:S6,  bg:C.bg,     light:false, clouds:true,  nav:true,  name:'Frequency'},
  {C:S7,  bg:C.bg,     light:false, clouds:true,  nav:true,  name:'Alert'},
  {C:S8,  bg:C.bg,     light:false, clouds:true,  nav:true,  name:'Ticks Hide'},
  {C:S9,  bg:'#1a1208',light:true,  clouds:false, nav:true,  name:'Find The Tick'},
  {C:S10, bg:C.bg,     light:false, clouds:true,  nav:true,  name:'AI View'},
  {C:S11, bg:C.bg,     light:false, clouds:true,  nav:true,  name:'Features'},
  {C:S12, bg:C.bg,     light:false, clouds:true,  nav:true,  name:'Reviews'},
  {C:S13, bg:C.bg,     light:false, clouds:false, nav:false, name:'Rate App'},
  {C:S14, bg:C.bg,     light:false, clouds:true,  nav:false, name:'Paywall'},
  {C:S15, bg:C.bg,     light:false, clouds:true,  nav:false, name:'Camera'},
  {C:S16, bg:C.bg,     light:false, clouds:true,  nav:false, name:'Notifications'},
  {C:S17, bg:C.bg,     light:false, clouds:true,  nav:false, name:'Location'},
];
const N=SCREENS.length;

/* ══════════════════════════════════════════════════════════
   ROOT
══════════════════════════════════════════════════════════ */
function App(){
  const[cur,sc]=useState(0);
  const gN=useCallback(()=>sc(c=>Math.min(c+1,N-1)),[]);
  const gP=useCallback(()=>sc(c=>Math.max(c-1,0)),[]);
  useEffect(()=>{
    const h=e=>{if(e.key==='ArrowRight')gN();if(e.key==='ArrowLeft')gP()};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[gN,gP]);

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:18}}>
      {/* Phone */}
      <div style={{width:375,height:812,borderRadius:52,overflow:'hidden',flexShrink:0,
        boxShadow:'0 48px 120px rgba(0,0,0,.5),0 0 0 10px #1c1c1e,inset 0 0 0 1.5px #2e2e2e',
        position:'relative',userSelect:'none'}}>
        {/* Dynamic island */}
        <div style={{position:'absolute',top:12,left:'50%',transform:'translateX(-50%)',
          width:120,height:34,background:'#080808',borderRadius:20,zIndex:30,
          boxShadow:'inset 0 0 0 1px rgba(255,255,255,.05)'}}/>
        {/* Slide strip */}
        <div style={{width:'100%',height:'100%',overflow:'hidden'}}>
          <div style={{display:'flex',width:`${N*375}px`,height:'100%',
            transform:`translateX(-${cur*375}px)`,
            transition:'transform .45s cubic-bezier(.4,0,.2,1)'}}>
            {SCREENS.map(({C:Comp,bg,light,clouds,nav},i)=>(
              <div key={i} style={{width:375,height:'100%',flexShrink:0,
                background:bg,display:'flex',flexDirection:'column',position:'relative',
                overflow:'hidden'}}>
                {clouds&&<Clouds/>}
                <SBar light={light}/>
                {nav&&<Nav step={i} total={N} onBack={gP} light={light}/>}
                <Comp active={cur===i} onNext={gN}/>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Controls */}
      <div style={{display:'flex',alignItems:'center',gap:12,
        background:'rgba(255,255,255,.55)',padding:'10px 18px',borderRadius:40,
        backdropFilter:'blur(14px)',boxShadow:'0 2px 16px rgba(0,0,0,.1)'}}>
        <button onClick={gP} disabled={cur===0}
          style={{padding:'7px 16px',borderRadius:18,border:'none',
            background:cur===0?'#d8d4cc':C.dark,
            color:cur===0?C.muted:C.white,
            fontWeight:700,fontSize:14,transition:'all .2s'}}>‹</button>
        <div style={{display:'flex',gap:4,flexWrap:'wrap',
          maxWidth:240,justifyContent:'center'}}>
          {Array.from({length:N},(_,i)=>(
            <button key={i} onClick={()=>sc(i)}
              style={{width:i===cur?18:6,height:6,borderRadius:3,padding:0,
                background:i===cur?C.dark:C.muted,
                border:'none',transition:'all .3s ease',cursor:'pointer'}}/>
          ))}
        </div>
        <button onClick={gN} disabled={cur===N-1}
          style={{padding:'7px 16px',borderRadius:18,border:'none',
            background:cur===N-1?'#d8d4cc':C.dark,
            color:cur===N-1?C.muted:C.white,
            fontWeight:700,fontSize:14,transition:'all .2s'}}>›</button>
      </div>

      <div style={{fontSize:11,fontWeight:700,color:'rgba(0,0,0,.3)',
        letterSpacing:'.08em',textTransform:'uppercase'}}>
        {cur+1} / {N} · {SCREENS[cur].name} · ← → navigate
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
